openapi: "3.0.3"
info:
  title: Ticketa API
  description: Ticketovací systém pro školy. Studenti a zaměstnanci zakládají tikety; správci je spravují a konfigurují nasazení za běhu.
  version: "0.1.0"
servers:
  - url: /
    description: Aktuální server

components:

  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session_token
      description: Relace uložená v HTTP-only cookie. Nastavuje se přihlášením přes `POST /api/login`.

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
      description: Číselný identifikátor záznamu.

  schemas:

    ErrorResponse:
      type: object
      description: Standardní chybová odpověď vrácená při všech chybách API.
      properties:
        code:
          type: integer
          example: 404
        status:
          type: string
          example: Not Found
        msg:
          type: string
          example: ticket not found
      required: [code, status, msg]

    NullableString:
      type: object
      description: Nullable textové pole z PostgreSQL (sql.NullString).
      properties:
        String:
          type: string
        Valid:
          type: boolean
      required: [String, Valid]

    NullableTime:
      type: object
      description: Nullable časové razítko z PostgreSQL (sql.NullTime).
      properties:
        Time:
          type: string
          format: date-time
        Valid:
          type: boolean
      required: [Time, Valid]

    NullableInt32:
      type: object
      description: Nullable celé číslo z PostgreSQL (sql.NullInt32).
      properties:
        Int32:
          type: integer
          format: int32
        Valid:
          type: boolean
      required: [Int32, Valid]

    UserType:
      type: string
      enum: [student, staff, maintainer]
      description: |
        Typ uživatele určuje jeho oprávnění:
        - `student` — může zakládat a spravovat vlastní tikety
        - `staff` — může zakládat a spravovat vlastní tikety
        - `maintainer` — plný přístup ke správě tiketů, uživatelů a konfigurace

    User:
      type: object
      description: Uživatelský účet.
      properties:
        ID:
          type: integer
          format: int32
        Email:
          type: string
          format: email
        FirstName:
          $ref: '#/components/schemas/NullableString'
        LastName:
          $ref: '#/components/schemas/NullableString'
        UserType:
          $ref: '#/components/schemas/UserType'
        Provider:
          type: string
          description: Způsob přihlášení (`local` pro lokální účty).
          example: local
        IsActive:
          type: boolean
          description: Neaktivní uživatelé se nemohou přihlásit.
        CreatedAt:
          type: string
          format: date-time
        LastLoginAt:
          $ref: '#/components/schemas/NullableTime'
      required: [ID, Email, FirstName, LastName, UserType, Provider, IsActive, CreatedAt, LastLoginAt]

    Ticket:
      type: object
      description: Tiket vytvořený uživatelem.
      properties:
        ID:
          type: integer
          format: int64
        Title:
          type: string
          description: Krátký název tiketu.
        Body:
          type: string
          description: Podrobný popis problému.
        CreatedAt:
          type: string
          format: date-time
        AuthorID:
          type: integer
          format: int32
          description: ID autora tiketu.
        StatusID:
          $ref: '#/components/schemas/NullableInt32'
      required: [ID, Title, Body, CreatedAt, AuthorID, StatusID]

    TicketStatus:
      type: object
      description: Stav tiketu (např. Otevřeno, Probíhá, Vyřešeno).
      properties:
        ID:
          type: integer
          format: int32
        Title:
          type: string
          description: Název stavu zobrazovaný uživatelům.
          example: Probíhá
        Color:
          type: string
          description: Barva stavu ve formátu HEX.
          pattern: '^#[0-9a-fA-F]{6}$'
          example: "#f39c12"
        Position:
          type: integer
          format: int32
          description: Pořadí stavu (0 = první/otevřeno, nejvyšší = vyřešeno).
      required: [ID, Title, Color, Position]

    LoggingConfig:
      type: object
      description: Konfigurace logování.
      properties:
        Level:
          type: string
          enum: [info, debug]
          description: Úroveň logování.
        Dir:
          type: string
          description: Adresář pro ukládání log souborů.
          example: /var/log/ticketa
      required: [Level, Dir]

    StatusConfig:
      type: object
      description: Definice stavu tiketu v konfiguraci YAML.
      properties:
        Title:
          type: string
          example: Otevřeno
        Color:
          type: string
          pattern: '^#[0-9a-fA-F]{6}$'
          example: "#3498db"
      required: [Title, Color]

    Config:
      type: object
      description: Běhová konfigurace aplikace.
      properties:
        Logging:
          $ref: '#/components/schemas/LoggingConfig'
        TicketStatuses:
          type: array
          description: Seřazený seznam stavů tiketů (min. 3). První = otevřeno, poslední = vyřešeno.
          items:
            $ref: '#/components/schemas/StatusConfig'
          minItems: 3
      required: [Logging, TicketStatuses]

paths:

  /api/register:
    post:
      summary: Registrace nového uživatele
      description: Vytvoří lokální účet. Vyžaduje platný e-mail, heslo splňující pravidla složitosti a typ uživatele.
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: jan.novak@skola.cz
                password:
                  type: string
                  description: Min. 8 znaků, musí obsahovat velké písmeno, číslici a speciální znak.
                  example: Heslo123!
                user_type:
                  $ref: '#/components/schemas/UserType'
                first_name:
                  type: string
                  example: Jan
                last_name:
                  type: string
                  example: Novák
              required: [email, password, user_type]
      responses:
        "201":
          description: Účet byl vytvořen.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                    format: int32
                required: [id]
              example:
                id: 42
        "400":
          description: Neplatný vstup (chybějící pole, slabé heslo, neznámý typ uživatele).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru (např. duplicitní e-mail).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/login:
    post:
      summary: Přihlášení
      description: Ověří přihlašovací údaje a nastaví session cookie `session_token` (HTTP-only, platnost 7 dní).
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: jan.novak@skola.cz
                password:
                  type: string
                  example: Heslo123!
              required: [email, password]
      responses:
        "200":
          description: Přihlášení proběhlo úspěšně. Session cookie je nastavena.
          headers:
            Set-Cookie:
              description: HTTP-only session cookie `session_token`.
              schema:
                type: string
        "400":
          description: Neplatné tělo požadavku.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Nesprávné přihlašovací údaje nebo neaktivní účet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/tickets:
    post:
      summary: Vytvoření tiketu
      description: Vytvoří nový tiket. `author_id` je nastaven automaticky ze session.
      tags: [Tikety]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Krátký název tiketu.
                  example: Nemohu se přihlásit
                body:
                  type: string
                  description: Podrobný popis problému.
                  example: Po zadání hesla se nic nestane.
                status_id:
                  type: integer
                  format: int32
                  nullable: true
                  description: Volitelné ID stavu tiketu.
              required: [title, body]
      responses:
        "201":
          description: Tiket byl vytvořen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        "400":
          description: Neplatné tělo požadavku.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Chybí povinné pole (`title` nebo `body`).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      summary: Seznam tiketů
      description: Vrátí všechny tikety seřazené od nejnovějšího.
      tags: [Tikety]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Seznam tiketů (prázdné pole pokud žádné neexistují).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Ticket'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/tickets/{id}:
    parameters:
      - $ref: '#/components/parameters/id'

    get:
      summary: Detail tiketu
      tags: [Tikety]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Tiket nalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        "400":
          description: Neplatné ID (není číslo).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Tiket nenalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      summary: Aktualizace tiketu
      description: Upraví titul, tělo nebo stav tiketu. Povoleno pouze autorovi tiketu.
      tags: [Tikety]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                body:
                  type: string
                status_id:
                  type: integer
                  format: int32
                  nullable: true
      responses:
        "200":
          description: Tiket byl upraven.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ticket'
        "400":
          description: Neplatné ID nebo tělo požadavku.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Přihlášený uživatel není autorem tiketu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Tiket nenalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Smazání tiketu
      description: Smaže tiket. Povoleno pouze autorovi tiketu.
      tags: [Tikety]
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Tiket byl smazán.
        "400":
          description: Neplatné ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Přihlášený uživatel není autorem tiketu.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Tiket nenalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/config:
    get:
      summary: Získání běhové konfigurace
      description: Vrátí aktuální konfiguraci aplikace. Pouze správci.
      tags: [Správa — konfigurace]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Aktuální konfigurace.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Aktualizace běhové konfigurace
      description: |
        Částečně aktualizuje konfiguraci. Změny jsou okamžitě uloženy do /config/ticketa.yaml
        na hostitelském systému (atomickým přejmenováním) a platí bez restartu serveru.
        Vyžaduje min. 3 stavy tiketů, je-li pole ticket_statuses přítomno.
      tags: [Správa — konfigurace]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                logging:
                  $ref: '#/components/schemas/LoggingConfig'
                ticket_statuses:
                  type: array
                  items:
                    $ref: '#/components/schemas/StatusConfig'
                  minItems: 3
      responses:
        "200":
          description: Konfigurace byla aktualizována.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        "400":
          description: Neplatné tělo nebo selhání uložení na disk.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/ticket-statuses:
    get:
      summary: Seznam stavů tiketů
      description: Vrátí všechny stavy seřazené podle pozice (od nejnižší). Pouze správci.
      tags: [Správa — stavy tiketů]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Seznam stavů (prázdné pole pokud žádné neexistují).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TicketStatus'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      summary: Vytvoření stavu tiketu
      description: |
        Přidá nový stav. Stav je zároveň přidán do běhové konfigurace YAML.
        Pokud není zadána barva, použije se výchozí šedá (#808080).
      tags: [Správa — stavy tiketů]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                  description: Název stavu.
                  example: Čeká na odpověď
                color:
                  type: string
                  description: Barva ve formátu HEX.
                  example: "#9b59b6"
                position:
                  type: integer
                  format: int32
                  description: Pořadí stavu (musí být unikátní).
              required: [title]
      responses:
        "201":
          description: Stav byl vytvořen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketStatus'
        "400":
          description: Neplatné tělo požadavku.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "422":
          description: Chybí povinné pole title.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru (např. duplicitní pozice).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/ticket-statuses/{id}:
    parameters:
      - $ref: '#/components/parameters/id'

    put:
      summary: Aktualizace stavu tiketu
      description: Upraví název nebo barvu stavu. Konfigurace YAML je synchronizována.
      tags: [Správa — stavy tiketů]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                color:
                  type: string
                  pattern: '^#[0-9a-fA-F]{6}$'
      responses:
        "200":
          description: Stav byl upraven.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TicketStatus'
        "400":
          description: Neplatné ID nebo tělo požadavku.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Stav nenalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      summary: Smazání stavu tiketu
      description: Smaže stav a synchronizuje konfiguraci YAML. Tikety odkazující na tento stav budou mít StatusID nastaven na NULL.
      tags: [Správa — stavy tiketů]
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Stav byl smazán.
        "400":
          description: Neplatné ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/users:
    get:
      summary: Seznam uživatelů
      description: Vrátí seznam všech uživatelů. Pouze správci.
      tags: [Správa — uživatelé]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Seznam uživatelů.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/admin/users/{id}:
    parameters:
      - $ref: '#/components/parameters/id'

    get:
      summary: Detail uživatele
      tags: [Správa — uživatelé]
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Uživatel nalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Neplatné ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Uživatel nenalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Aktualizace uživatele
      description: |
        Změní aktivní stav (`is_active`) nebo typ uživatele (`user_type`). Pole jsou volitelná —
        lze změnit jedno nebo obě najednou. Deaktivovaný uživatel se nemůže přihlásit.
      tags: [Správa — uživatelé]
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                is_active:
                  type: boolean
                  description: Nastaví aktivitu účtu.
                user_type:
                  $ref: '#/components/schemas/UserType'
      responses:
        "200":
          description: Uživatel byl aktualizován.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        "400":
          description: Neplatné ID nebo tělo požadavku.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: Chybí platná session cookie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "403":
          description: Uživatel není správce.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "404":
          description: Uživatel nenalezen.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: Interní chyba serveru.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
